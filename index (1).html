<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dagua</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: sans-serif;
  }

  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 3px;
    background: #000;
  }

  .thumb {
    cursor: pointer;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Horizontal: wider */
  .thumb.h {
    width: calc(50% - 2px);
    aspect-ratio: 4/3;
  }

  /* Vertical: narrower */
  .thumb.v {
    width: calc(33.333% - 2px);
    aspect-ratio: 3/4;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.15s;
  }

  .thumb:active img {
    opacity: 0.8;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  #lightbox.open {
    display: flex;
  }

  #lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  #lb-close {
    position: fixed;
    top: 12px;
    right: 16px;
    color: #fff;
    font-size: 36px;
    line-height: 1;
    cursor: pointer;
    z-index: 1001;
    background: none;
    border: none;
    padding: 4px 8px;
    opacity: 0.85;
  }

  #lb-close:hover { opacity: 1; }

  #lb-prev, #lb-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    color: #fff;
    font-size: 42px;
    line-height: 1;
    cursor: pointer;
    z-index: 1001;
    background: rgba(0,0,0,0.35);
    border: none;
    padding: 12px 16px;
    opacity: 0.8;
    user-select: none;
  }

  #lb-prev { left: 0; }
  #lb-next { right: 0; }

  #lb-prev:hover, #lb-next:hover { opacity: 1; background: rgba(0,0,0,0.6); }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .thumb.h { width: calc(60% - 2px); }
    .thumb.v { width: calc(40% - 2px); }
    #lb-prev, #lb-next { font-size: 30px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="gallery" id="gallery">
  <!-- Tanda 1 -->
  <div class="thumb v" data-index="0"><img src="IMG_20190827_162853.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="1"><img src="IMG_20200102_111719.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="2"><img src="IMG_20200102_125524_1.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="3"><img src="IMG_20200102_125752.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb v" data-index="4"><img src="IMG_20200609_181101.jpg" alt="foto" loading="lazy"></div>
  <!-- Tanda 2 -->
  <div class="thumb v" data-index="5"><img src="IMG_20200609_174651_2.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="6"><img src="IMG_20200609_181526.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb v" data-index="7"><img src="IMG_20200823_164557.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="8"><img src="IMG_20210827_193714.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb v" data-index="9"><img src="IMG_20200609_180814.jpg" alt="foto" loading="lazy"></div>
  <div class="thumb h" data-index="10"><img src="IMG_20200609_181552.jpg" alt="foto" loading="lazy"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" aria-label="Cerrar">&#x2715;</button>
  <button id="lb-prev" aria-label="Anterior">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" aria-label="Siguiente">&#8250;</button>
</div>

<script>
  const photos = [
    "IMG_20190827_162853.jpg",
    "IMG_20200102_111719.jpg",
    "IMG_20200102_125524_1.jpg",
    "IMG_20200102_125752.jpg",
    "IMG_20200609_181101.jpg",
    "IMG_20200609_174651_2.jpg",
    "IMG_20200609_181526.jpg",
    "IMG_20200823_164557.jpg",
    "IMG_20210827_193714.jpg",
    "IMG_20200609_180814.jpg",
    "IMG_20200609_181552.jpg"
  ];

  let current = 0;
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');

  function openLightbox(index) {
    current = index;
    lbImg.src = photos[current];
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  function showPrev() {
    current = (current - 1 + photos.length) % photos.length;
    lbImg.src = photos[current];
  }

  function showNext() {
    current = (current + 1) % photos.length;
    lbImg.src = photos[current];
  }

  document.querySelectorAll('.thumb').forEach(el => {
    el.addEventListener('click', () => openLightbox(parseInt(el.dataset.index)));
  });

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); showPrev(); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); showNext(); });

  lb.addEventListener('click', e => {
    if (e.target === lb) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
    if (e.key === 'Escape') closeLightbox();
  });

  // Touch swipe
  let touchStartX = 0;
  lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) dx < 0 ? showNext() : showPrev();
  }, { passive: true });
</script>
</body>
</html>
